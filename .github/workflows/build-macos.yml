name: Build macOS Electron App

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode (local or remote)'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - remote

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Electron dependencies
        working-directory: ./electron
        run: npm ci

      - name: Set build configuration
        working-directory: ./electron
        run: node scripts/set-config.js ${{ github.event.inputs.build_mode }}

      - name: Build Electron app for macOS (ZIP only for CI)
        working-directory: ./electron
        run: |
          npx cross-env CSC_IDENTITY_AUTO_DISCOVERY=false electron-builder --mac --config.mac.target=zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: copanion-macos-zip
          path: electron/dist-electron/*.zip
          retention-days: 30

      - name: List build artifacts
        working-directory: ./electron/dist-electron
        run: ls -lah
