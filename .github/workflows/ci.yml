name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (advisory)
        continue-on-error: true
        run: npm run lint

      - name: Test
        run: npm test

  connector:
    name: Connector tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: connector/go.sum

      - name: Test connector
        working-directory: connector
        run: go test ./...
