name: Feature request
description: Suggest an improvement or new local-first capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Electron app
        - Connector daemon
        - AI runtime integration
        - OpenClaw gateway
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other designs you considered?
  - type: checkboxes
    id: local-first
    attributes:
      label: Local-first fit
      options:
        - label: This feature still works without Hyperclaw Cloud.
          required: false
