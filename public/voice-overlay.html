<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Input</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
    }
    
    /* Glassmorphism Container */
    .container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      -webkit-app-region: drag;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
    }
    
    .status-dot.listening {
      background: #ef4444;
      box-shadow: 0 0 12px #ef4444;
      animation: pulse 1s infinite;
    }
    
    .status-dot.whisper {
      background: #8b5cf6;
      box-shadow: 0 0 12px #8b5cf6;
    }
    
    .status-dot.processing {
      background: #f59e0b;
      box-shadow: 0 0 12px #f59e0b;
      animation: pulse 0.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    
    .status-text {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    
    .engine-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(139, 92, 246, 0.25);
      color: #a78bfa;
      border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    
    .close-btn {
      -webkit-app-region: no-drag;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .close-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      color: #fff;
    }
    
    /* Transcript Area */
    .transcript-area {
      flex: 1;
      padding: 24px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .transcript {
      font-size: 20px;
      line-height: 1.6;
      text-align: center;
      width: 100%;
      font-weight: 400;
    }
    
    .transcript.placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    .transcript .interim {
      color: rgba(255, 255, 255, 0.6);
      font-style: italic;
    }
    
    .cursor {
      display: inline-block;
      width: 2px;
      height: 22px;
      background: linear-gradient(180deg, #8b5cf6, #6366f1);
      animation: blink 1s infinite;
      vertical-align: middle;
      margin-left: 2px;
      border-radius: 1px;
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    /* Waveform */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 50px;
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .waveform-bar {
      width: 4px;
      background: linear-gradient(180deg, #8b5cf6, #6366f1);
      border-radius: 2px;
      transition: height 0.08s ease-out;
    }
    
    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.15);
    }
    
    .picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    select {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    select:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(139, 92, 246, 0.5);
    }
    
    select:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }
    
    select option {
      background: #1f2937;
      color: #fff;
    }
    
    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .btn-mic {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: #fff;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
    }
    
    .btn-mic:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
    }
    
    .btn-mic.listening {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5);
      animation: micPulse 1.5s infinite;
    }
    
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 4px 25px rgba(239, 68, 68, 0.8); }
    }
    
    .btn-send {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }
    
    .btn-send:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
    }
    
    .btn-copy {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .btn-copy:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
    }
    
    /* Hint */
    .hint {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
    }
    
    .hint kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 3px 8px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 10px;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      -webkit-app-region: drag;
    }
    
    .tab {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }
    
    .tab:hover {
      color: rgba(255, 255, 255, 0.8);
    }
    
    .tab.active {
      color: #a78bfa;
      border-bottom-color: #8b5cf6;
    }
    
    /* Word Input Section */
    .word-section {
      padding: 20px;
      display: none;
    }
    
    .word-section.active {
      display: block;
    }
    
    .word-input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .word-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
    }
    
    .word-input:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }
    
    .word-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    
    .word-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .word-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .word-item .word {
      font-weight: 500;
    }
    
    .word-item .definition {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .word-item .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
    }
    
    .word-item .delete-btn:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.2);
    }
    
    /* Mode indicator */
    .mode-toggle {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 2px;
    }
    
    .mode-btn {
      padding: 6px 12px;
      font-size: 11px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .mode-btn.active {
      background: rgba(139, 92, 246, 0.3);
      color: #fff;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #a78bfa;
      font-size: 12px;
    }
    
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(167, 139, 250, 0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="voice">🎤 Voice</div>
      <div class="tab" data-tab="insert">📝 Insert Text</div>
      <div class="tab" data-tab="words">📚 Words</div>
    </div>
    
    <!-- Voice Tab -->
    <div class="tab-content" id="voice-tab">
      <div class="header">
        <div class="header-left">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text" id="statusText">Voice Input</span>
          <span class="engine-badge" id="engineBadge">Whisper</span>
        </div>
        <button class="close-btn" id="closeBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="transcript-area">
        <p class="transcript placeholder" id="transcript">Initializing Whisper...</p>
      </div>
      
      <div class="waveform" id="waveform">
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
        <div class="waveform-bar" style="height: 8px;"></div>
      </div>
      
      <div class="controls">
        <div class="picker">
          <select id="agentSelect">
            <option value="main">🤖 main</option>
            <option value="ada">📝 ada</option>
            <option value="echo">🐦 echo</option>
            <option value="clio">📚 clio</option>
          </select>
          <select id="sessionSelect">
            <option value="main">session: main</option>
          </select>
        </div>
        
        <div class="actions">
          <button class="btn btn-mic" id="micBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <button class="btn btn-copy" id="copyBtn" title="Copy to clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <button class="btn btn-send" id="sendBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send
          </button>
        </div>
      </div>
    </div>
    
    <!-- Insert Text Tab -->
    <div class="tab-content" id="insert-tab" style="display: none;">
      <div class="header">
        <div class="header-left">
          <span class="status-text">Insert Text Anywhere</span>
        </div>
      </div>
      
      <div class="transcript-area" style="flex-direction: column; gap: 16px;">
        <p style="color: rgba(255,255,255,0.5); font-size: 13px;">
          Type text below, then press <kbd style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">Ctrl+Shift+V</kbd> in any app to insert it.
        </p>
        <textarea class="word-input" id="insertTextarea" rows="3" placeholder="Enter text to insert..." style="width: 100%; resize: none;"></textarea>
        <button class="btn btn-send" id="saveInsertBtn" style="width: 100%;">
          Save for Insert
        </button>
      </div>
      
      <div class="controls">
        <span style="color: rgba(255,255,255,0.4); font-size: 12px;">
          Saved: <span id="savedTextPreview">-</span>
        </span>
        <button class="btn btn-copy" id="clearInsertBtn">
          Clear
        </button>
      </div>
    </div>
    
    <!-- Words Tab -->
    <div class="tab-content" id="words-tab" style="display: none;">
      <div class="header">
        <div class="header-left">
          <span class="status-text">Custom Words</span>
        </div>
      </div>
      
      <div class="word-section active">
        <div class="word-input-group">
          <input type="text" class="word-input" id="wordInput" placeholder="New word...">
          <input type="text" class="word-input" id="definitionInput" placeholder="Definition..." style="flex: 2;">
        </div>
        <button class="btn btn-send" id="addWordBtn" style="width: 100%; margin-bottom: 16px;">
          Add Word
        </button>
        
        <div class="word-list" id="wordList">
          <!-- Words will be populated here -->
        </div>
      </div>
    </div>
    
    <div class="hint">
      Press <kbd>Esc</kbd> to close • <kbd>Ctrl+Enter</kbd> to send voice
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    
    // State
    let isListening = false;
    let transcript = '';
    let interimTranscript = '';
    let whisperReady = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioContext = null;
    let analyser = null;
    let mediaStream = null;
    let animationFrame = null;
    let savedInsertText = '';
    let words = [];
    
    // Elements
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const transcriptEl = document.getElementById('transcript');
    const waveformEl = document.getElementById('waveform');
    const micBtn = document.getElementById('micBtn');
    const sendBtn = document.getElementById('sendBtn');
    const copyBtn = document.getElementById('copyBtn');
    const closeBtn = document.getElementById('closeBtn');
    const agentSelect = document.getElementById('agentSelect');
    const sessionSelect = document.getElementById('sessionSelect');
    const bars = waveformEl.querySelectorAll('.waveform-bar');
    const tabs = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');
    
    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabId = tab.dataset.tab;
        
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        tabContents.forEach(content => {
          content.style.display = content.id === `${tabId}-tab` ? 'block' : 'none';
        });
      });
    });
    
    // Initialize Whisper
    async function initWhisper() {
      try {
        transcriptEl.textContent = 'Loading Whisper model...';

        const result = await ipcRenderer.invoke('whisper-initialize');

        if (result.success) {
          whisperReady = true;
          statusDot.classList.add('whisper');
          transcriptEl.textContent = 'Press the mic to start recording';
          transcriptEl.classList.remove('placeholder');
        } else {
          transcriptEl.textContent = 'Using fallback mode.';
        }
      } catch (error) {
        console.error('[VoiceOverlay] Error initializing:', error);
        transcriptEl.textContent = 'Error: ' + error.message;
      }
    }

    initWhisper();
    
    // Close button
    closeBtn.addEventListener('click', () => {
      stopListening();
      ipcRenderer.invoke('hide-voice-overlay');
    });
    
    // Mic button
    micBtn.addEventListener('click', toggleListening);
    
    // Send button
    sendBtn.addEventListener('click', sendMessage);
    
    // Copy button
    copyBtn.addEventListener('click', () => {
      if (transcript.trim()) {
        navigator.clipboard.writeText(transcript);
        copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        setTimeout(() => {
          copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
        }, 1500);
      }
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        stopListening();
        ipcRenderer.invoke('hide-voice-overlay');
      } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        const activeTab = document.querySelector('.tab.active').dataset.tab;
        if (activeTab === 'voice') {
          sendMessage();
        }
      }
    });
    
    function toggleListening() {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    }
    
    async function startListening() {
      transcript = '';
      interimTranscript = '';
      audioChunks = [];
      
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ 
          audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true } 
        });
        
        await startAudioAnalysis();
        
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm;codecs=opus' });
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = async () => {
          await processAudio();
        };
        
        mediaRecorder.start(100);
        isListening = true;
        updateUI();
        
      } catch (error) {
        console.error('[VoiceOverlay] Error starting recording:', error);
        transcriptEl.textContent = 'Error: ' + error.message;
      }
    }
    
    async function processAudio() {
      if (audioChunks.length === 0) return;
      
      try {
        statusText.textContent = 'Transcribing...';
        statusDot.classList.add('processing');
        
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const arrayBuffer = await audioBlob.arrayBuffer();
        
        if (!audioContext) {
          audioContext = new AudioContext({ sampleRate: 16000 });
        }
        
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const audioData = audioBuffer.getChannelData(0);
        
        const normalizedData = new Float32Array(audioData.length);
        for (let i = 0; i < audioData.length; i++) {
          normalizedData[i] = audioData[i];
        }
        
        const result = await ipcRenderer.invoke('whisper-transcribe', Array.from(normalizedData));
        
        if (result.success && result.text) {
          transcript = result.text;
        } else {
          transcript = '[Audio captured - transcription pending]';
        }
        
        updateTranscript();
        
      } catch (error) {
        console.error('[VoiceOverlay] Error processing audio:', error);
        transcriptEl.textContent = 'Processing error: ' + error.message;
      } finally {
        statusDot.classList.remove('processing');
      }
    }
    
    function stopListening() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      stopAudioAnalysis();
      isListening = false;
      updateUI();
    }
    
    async function startAudioAnalysis() {
      if (!mediaStream) return;
      
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        
        const source = audioContext.createMediaStreamSource(mediaStream);
        source.connect(analyser);
        
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        function updateVisualization() {
          if (!analyser || !isListening) return;
          
          analyser.getByteFrequencyData(dataArray);
          
          const step = Math.floor(dataArray.length / bars.length);
          for (let i = 0; i < bars.length; i++) {
            const value = dataArray[i * step];
            const height = Math.max(4, (value / 255) * 40);
            bars[i].style.height = height + 'px';
          }
          
          animationFrame = requestAnimationFrame(updateVisualization);
        }
        
        updateVisualization();
      } catch (error) {
        console.error('[VoiceOverlay] Error:', error);
      }
    }
    
    function stopAudioAnalysis() {
      if (animationFrame) {
        cancelAnimationFrame(animationFrame);
        animationFrame = null;
      }
      
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      
      analyser = null;
      bars.forEach(bar => bar.style.height = '8px');
    }
    
    function updateTranscript() {
      if (transcript.trim()) {
        transcriptEl.innerHTML = transcript + (isListening ? '<span class="cursor"></span>' : '');
        transcriptEl.classList.remove('placeholder');
      } else if (whisperReady) {
        transcriptEl.textContent = 'Press the mic to start recording';
        transcriptEl.classList.add('placeholder');
      }
    }
    
    function updateUI() {
      if (isListening) {
        statusDot.classList.add('listening');
        statusDot.classList.remove('whisper', 'processing');
        statusText.textContent = 'Recording...';
        micBtn.classList.add('listening');
        waveformEl.style.display = 'flex';
      } else {
        statusDot.classList.remove('listening', 'processing');
        if (whisperReady) statusDot.classList.add('whisper');
        statusText.textContent = 'Voice Input';
        micBtn.classList.remove('listening');
        waveformEl.style.display = 'none';
      }
      
      sendBtn.disabled = !transcript.trim();
    }
    
    function sendMessage() {
      const text = transcript.trim();
      if (!text) return;
      
      const agentId = agentSelect.value;
      const sessionKey = `agent:${agentId}:${sessionSelect.value}`;
      
      ipcRenderer.send('voice-message', { text, agentId, sessionKey });
      
      setTimeout(() => {
        ipcRenderer.invoke('hide-voice-overlay');
      }, 300);
    }
    
    // ===== INSERT TEXT FEATURE =====
    const insertTextarea = document.getElementById('insertTextarea');
    const saveInsertBtn = document.getElementById('saveInsertBtn');
    const clearInsertBtn = document.getElementById('clearInsertBtn');
    const savedTextPreview = document.getElementById('savedTextPreview');
    
    saveInsertBtn.addEventListener('click', () => {
      savedInsertText = insertTextarea.value;
      savedTextPreview.textContent = savedInsertText.substring(0, 30) + (savedInsertText.length > 30 ? '...' : '');
      
      // Save to storage
      ipcRenderer.send('save-insert-text', savedInsertText);
    });
    
    clearInsertBtn.addEventListener('click', () => {
      insertTextarea.value = '';
      savedInsertText = '';
      savedTextPreview.textContent = '-';
      ipcRenderer.send('save-insert-text', '');
    });
    
    // ===== WORDS DATABASE FEATURE =====
    const wordInput = document.getElementById('wordInput');
    const definitionInput = document.getElementById('definitionInput');
    const addWordBtn = document.getElementById('addWordBtn');
    const wordList = document.getElementById('wordList');
    
    async function loadWords() {
      const result = await ipcRenderer.invoke('get-words');
      if (result.success) {
        words = result.words || [];
        renderWords();
      }
    }
    
    function renderWords() {
      wordList.innerHTML = words.map((w, i) => `
        <div class="word-item">
          <div>
            <span class="word">${w.word}</span>
            <span class="definition">- ${w.definition}</span>
          </div>
          <button class="delete-btn" data-index="${i}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      `).join('');
      
      // Add delete handlers
      wordList.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const index = parseInt(btn.dataset.index);
          await ipcRenderer.invoke('delete-word', index);
          loadWords();
        });
      });
    }
    
    addWordBtn.addEventListener('click', async () => {
      const word = wordInput.value.trim();
      const definition = definitionInput.value.trim();
      
      if (word && definition) {
        await ipcRenderer.invoke('add-word', { word, definition });
        wordInput.value = '';
        definitionInput.value = '';
        loadWords();
      }
    });
    
    // Load words on start
    loadWords();
  </script>
</body>
</html>
